name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: map
    env:
      MAP_KEYSTORE_FILE: ${{ github.workspace }}/keys/release-keystore.p12
      MAP_KEYSTORE_PASSWORD: ${{ secrets.MAP_KEYSTORE_PASSWORD }}
      MAP_KEY_ALIAS: ${{ secrets.MAP_KEY_ALIAS }}
      MAP_KEY_PASSWORD: ${{ secrets.MAP_KEY_PASSWORD }}
      MAP_KEYSTORE_TYPE: ${{ secrets.MAP_KEYSTORE_TYPE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip cryptography

      - name: Restore Android signing keystore
        run: |
          mkdir -p keys
          echo "${{ secrets.MAP_KEYSTORE_BASE64 }}" | base64 --decode > "$MAP_KEYSTORE_FILE"

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Extract release version
        run: |
          set -euo pipefail
          VERSION_NAME="$(python -c "import re, pathlib; text = pathlib.Path('app/build.gradle.kts').read_text(encoding='utf-8'); m = re.search(r'versionName\\s*=\\s*\\\"([^\\\"]+)\\\"', text); print(m.group(1) if m else '')")"
          VERSION_CODE="$(python -c "import re, pathlib; text = pathlib.Path('app/build.gradle.kts').read_text(encoding='utf-8'); m = re.search(r'versionCode\\s*=\\s*(\\d+)', text); print(m.group(1) if m else '0')")"
          if [ -z "$VERSION_NAME" ]; then
            echo "Failed to parse versionName from app/build.gradle.kts"
            exit 1
          fi
          RELEASE_TAG="v${VERSION_NAME}"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Prepare release assets
        id: assets
        run: |
          set -euo pipefail
          APK_SOURCE="app/build/outputs/apk/release/app-release.apk"
          APK_TARGET="map-release.apk"
          cp "$APK_SOURCE" "$APK_TARGET"
          SHA256="$(sha256sum "$APK_TARGET" | awk '{print $1}')"
          PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export SHA256 PUBLISHED_AT
          python -c "import json, os; data = {'versionCode': int(os.environ['VERSION_CODE']), 'versionName': os.environ['VERSION_NAME'], 'apkUrl': f\"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{os.environ['RELEASE_TAG']}/map-release.apk\", 'sha256': os.environ['SHA256'], 'notesRu': f\"Подробности доступны в заметках к релизу {os.environ['RELEASE_TAG']}.\", 'notesEn': f\"See {os.environ['RELEASE_TAG']} release notes for details.\", 'publishedAt': os.environ['PUBLISHED_AT'], 'minSupportedVersionCode': 1, 'minSdk': 21}; open('update.json', 'w', encoding='utf-8').write(json.dumps(data, ensure_ascii=False, indent=2) + '\n')"

      - name: Sign update.json
        run: |
          set -euo pipefail
          umask 077
          cleanup() {
            rm -f update_signing_private.pem
          }
          trap cleanup EXIT
          export MAP_UPDATE_SIGNING_PRIVATE_PEM="${{ secrets.MAP_UPDATE_SIGNING_PRIVATE_PEM }}"
          python scripts/prepare_update_signing_key.py --secret-env MAP_UPDATE_SIGNING_PRIVATE_PEM --output update_signing_private.pem
          unset MAP_UPDATE_SIGNING_PRIVATE_PEM
          python scripts/sign_update_json.py --input update.json --private-key update_signing_private.pem

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          body: |
            ## RU
            - Релиз ${{ env.RELEASE_TAG }}.
            - Детали изменений приведены в autogenerated release notes.

            ## EN
            - Release ${{ env.RELEASE_TAG }}.
            - Detailed changes are listed in autogenerated release notes.
          files: |
            map-release.apk
            update.json
